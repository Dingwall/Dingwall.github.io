<!-- Landing Page View -->
<div *ngIf="!eventData">
    <div>
        <!-- <button (click)="createNewEvent()">Create New Event</button> -->
    </div>
    <div>
        <input type="text" placeholder="Event Code" [(ngModel)]="eventCodeToSearch">
        <button (click)="joinEvent()">Join Event</button>
    </div>
</div>

<!-- Event View -->
<div *ngIf="eventData">
    <div>
        <h2>{{ eventData?.event_name }}</h2>
        <h4>{{ eventData?.event_code }}</h4>
        <p>{{ eventData?.description }}</p>
    </div>
    <div>
        <!-- Big timer counting hours:minutes:seconds:milliseconds from startTime -->
        {{ totalTime | date: 'mm:ss.SS' }}
        <button *ngIf="!hasStarted" (click)="startTimer()">Start</button>
        <button *ngIf="active" (click)="stopTimer()">Stop</button>
        <button *ngIf="isStopped" (click)="resetTimer()">Reset</button>
    </div>
    <div>
        <div *ngFor="let athlete of eventData?.athletes" class="athlete-card">
            <ng-container *ngTemplateOutlet="athleteCard; context: { athlete: athlete }"></ng-container>
        </div>
        <div>
            <input type="text" placeholder="Athlete Name" [(ngModel)]="searchAthleteName">
            <button (click)="addAthlete()">Add Athlete</button>
        </div>
    </div>

</div>

<!-- An athlete card contains their name, a display of their total time -->
<!-- A display of their last 3 splits, and a LAP and STOP button -->
<ng-template #athleteCard let-athlete="athlete">
    <div>
        <div>
            {{ athlete.name }}
            <!-- Athlete total time here, should stop for all users when as user clicks stop on this athlete -->
        </div>
        <button 
            (click)="lapAthlete(athlete.id)"
            [disabled]="athleteStates.get(athlete.id)?.isFinished">
            LAP
        </button>
        <button 
            (click)="stopAthlete(athlete.id)"
            [disabled]="athleteStates.get(athlete.id)?.isFinished">
            STOP
        </button>
    </div>
    <div>
        <div *ngFor="let split of athleteStates.get(athlete.id)?.splits; let i = index">
            <ng-container *ngIf="i >= ((athleteStates.get(athlete.id)?.splits?.length) || 0) - 3">
                <span>
                    {{ getSplitInfo(athlete.id, i).deltaMs | date: 'mm:ss.SS' }}
                    ({{ getSplitInfo(athlete.id, i).totalMs | date: 'mm:ss.SS' }})
                </span>
            </ng-container>
        </div>
    </div>
</ng-template>
