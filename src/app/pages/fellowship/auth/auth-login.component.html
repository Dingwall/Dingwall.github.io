<div class="auth-container">
  <div class="auth-card">
    <h2>Sign In to Fellowship</h2>
    
    <div class="error-message" *ngIf="error">
      {{ error }}
    </div>

    <form (ngSubmit)="login()">
      <div class="form-group">
        <label>Email</label>
        <input 
          type="email" 
          [(ngModel)]="email"
          name="email"
          placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input 
          type="password" 
          [(ngModel)]="password"
          name="password"
          placeholder="Enter your password"
          (keyup.enter)="login()">
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Signing In...' : 'Sign In' }}
      </button>
    </form>

    <p class="signup-link">
      Don't have an account? <a href="#/fellowship/signup">Create one</a>
    </p>
  </div>
</div>
